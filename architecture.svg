<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- title -->
  <text x="64" y="62" font-size="40" font-weight="800" fill="#0f172a">Architecture</text>
  <text x="66" y="92" font-size="18" fill="#64748b">Community road-hazard warnings · Amazon Aurora PostgreSQL + PostGIS on the Zero Stack</text>

  <!-- ===== COL 1: CLIENTS ===== -->
  <text x="64" y="150" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="1.5">CLIENTS</text>

  <rect x="60" y="166" width="290" height="128" rx="14" fill="#f8fafc" stroke="#e2e8f1" stroke-width="1.5"/>
  <text x="80" y="200" font-size="22">📱</text>
  <text x="112" y="198" font-size="18" font-weight="700" fill="#0f172a">Driver App (mobile)</text>
  <text x="80" y="228" font-size="13.5" fill="#64748b">Report hazards · voice warnings</text>
  <text x="80" y="250" font-size="13.5" fill="#64748b">3D drive navigation · live GPS</text>
  <text x="80" y="278" font-size="12.5" fill="#94a3b8">Web Speech API · Geolocation</text>

  <rect x="60" y="312" width="290" height="128" rx="14" fill="#f8fafc" stroke="#e2e8f1" stroke-width="1.5"/>
  <text x="80" y="346" font-size="22">🖥️</text>
  <text x="112" y="344" font-size="18" font-weight="700" fill="#0f172a">Command Center (web)</text>
  <text x="80" y="374" font-size="13.5" fill="#64748b">Heatmap · hotspots · analytics</text>
  <text x="80" y="396" font-size="13.5" fill="#64748b">Live feed · leaderboard · reports</text>
  <text x="80" y="424" font-size="12.5" fill="#94a3b8">MapLibre GL rendering</text>

  <!-- arrows clients -> vercel -->
  <line x1="350" y1="230" x2="412" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="376" x2="412" y2="216" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== COL 2: VERCEL + SERVICES ===== -->
  <text x="416" y="150" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="1.5">VERCEL</text>

  <rect x="412" y="166" width="332" height="116" rx="14" fill="#111111"/>
  <text x="432" y="200" font-size="18" font-weight="800" fill="#ffffff">▲ Next.js 16 · App Router</text>
  <text x="432" y="228" font-size="13.5" fill="#cbd5e1">React 19 UI  +  API Routes (serverless)</text>
  <text x="432" y="252" font-size="13.5" fill="#cbd5e1">node-postgres · parameterized SQL</text>
  <text x="432" y="272" font-size="12.5" fill="#94a3b8">Auth: bcrypt + JWT cookie · Google OAuth</text>

  <!-- services 2x2 -->
  <text x="416" y="320" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="1">SUPPORTING SERVICES</text>
  <rect x="412" y="332" width="160" height="92" rx="12" fill="#f8fafc" stroke="#e2e8f1" stroke-width="1.5"/>
  <text x="430" y="362" font-size="15" font-weight="700" fill="#0f172a">Vercel Blob</text>
  <text x="430" y="386" font-size="12.5" fill="#64748b">Hazard photos</text>
  <text x="430" y="406" font-size="12.5" fill="#64748b">(browser-shrunk)</text>

  <rect x="584" y="332" width="160" height="92" rx="12" fill="#f8fafc" stroke="#e2e8f1" stroke-width="1.5"/>
  <text x="602" y="362" font-size="15" font-weight="700" fill="#0f172a">Ola Maps</text>
  <text x="602" y="386" font-size="12.5" fill="#64748b">Tiles · directions</text>
  <text x="602" y="406" font-size="12.5" fill="#64748b">geocoding</text>

  <!-- vercel <-> services -->
  <line x1="492" y1="282" x2="492" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="664" y1="282" x2="664" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- arrow vercel -> aurora -->
  <line x1="744" y1="224" x2="812" y2="224" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrowg)"/>
  <text x="752" y="214" font-size="12.5" font-weight="700" fill="#16a34a">spatial SQL</text>

  <!-- ===== COL 3: AURORA (HERO) ===== -->
  <rect x="812" y="150" width="404" height="430" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <rect x="812" y="150" width="404" height="64" rx="18" fill="#15803d"/>
  <rect x="812" y="186" width="404" height="28" fill="#15803d"/>
  <text x="836" y="180" font-size="13" font-weight="700" fill="#bbf7d0" letter-spacing="1">THE SPATIAL ENGINE</text>
  <text x="836" y="205" font-size="20" font-weight="800" fill="#ffffff">Amazon Aurora PostgreSQL 17</text>

  <text x="836" y="252" font-size="17" font-weight="800" fill="#15803d">+ PostGIS</text>
  <text x="836" y="280" font-size="13.5" fill="#334155">Every hazard = geography(Point, 4326)</text>
  <text x="836" y="300" font-size="13.5" fill="#334155">stored with a GiST spatial index</text>

  <line x1="836" y1="320" x2="1192" y2="320" stroke="#bbf7d0" stroke-width="1.5"/>

  <text x="836" y="350" font-size="14.5" font-weight="700" fill="#0f172a">ST_DWithin · ST_Distance</text>
  <text x="836" y="372" font-size="12.5" fill="#64748b">proximity warnings + hazard-aware routing</text>

  <text x="836" y="404" font-size="14.5" font-weight="700" fill="#0f172a">ST_ClusterDBSCAN</text>
  <text x="836" y="426" font-size="12.5" fill="#64748b">ranks live danger-zone hotspots</text>

  <text x="836" y="458" font-size="14.5" font-weight="700" fill="#0f172a">ST_GeogFromText · ST_MakeLine</text>
  <text x="836" y="480" font-size="12.5" fill="#64748b">routes become LINESTRINGs, scanned for hazards</text>

  <text x="836" y="512" font-size="14.5" font-weight="700" fill="#0f172a">GiST index</text>
  <text x="836" y="534" font-size="12.5" fill="#64748b">stays fast past 50,000 reports</text>

  <text x="836" y="566" font-size="12.5" font-style="italic" fill="#15803d">The database finds the danger — the app just draws it.</text>

  <!-- footer stack line -->
  <text x="64" y="636" font-size="14" fill="#94a3b8">Zero-ops stack:</text>
  <text x="180" y="636" font-size="14" font-weight="700" fill="#0f172a">Next.js on Vercel</text>
  <text x="338" y="636" font-size="14" fill="#94a3b8">·</text>
  <text x="352" y="636" font-size="14" font-weight="700" fill="#15803d">Amazon Aurora PostgreSQL + PostGIS</text>
  <text x="690" y="636" font-size="14" fill="#94a3b8">·</text>
  <text x="704" y="636" font-size="14" font-weight="700" fill="#0f172a">Vercel Blob</text>
  <text x="816" y="636" font-size="14" fill="#94a3b8">·</text>
  <text x="830" y="636" font-size="14" font-weight="700" fill="#0f172a">Ola Maps</text>
</svg>
